<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밥메이트: 캠퍼스 밥약 매칭 플랫폼</title>
    <style>
        :root {
            --ku-crimson: #8C1D40;      /* 고려대 크림슨 */
            --ku-gold: #D29A42;         /* 따뜻한 골드 */
            --bg-cream: #FAF6F0;        /* 메인 크림 배경색 */
            --text-dark: #2B2B2B;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* 1. 네비게이션 바 (상단 고정 메뉴) */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--ku-crimson);
            color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10%;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(140, 29, 64, 0.2);
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar .menu {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .navbar .menu a {
            color: var(--white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: color 0.3s;
            cursor: pointer;
        }

        .navbar .menu a:hover {
            color: var(--ku-gold);
        }

        /* 2. 메인 히어로 섹션 (첫 화면) */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, var(--ku-crimson), #5A1027);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            padding-top: 80px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--ku-gold);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .hero .cta-btn {
            background-color: var(--ku-gold);
            color: var(--white);
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .hero .cta-btn:hover {
            transform: translateY(-3px);
            background-color: #BD8734;
        }

        /* 3. 공통 섹션 스타일 */
        .section {
            padding: 100px 10%;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section:nth-child(even) {
            background-color: var(--white);
        }

        .section-title {
            font-size: 2.2rem;
            color: var(--ku-crimson);
            margin-bottom: 15px;
            position: relative;
            padding-bottom: 10px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 60px;
            height: 4px;
            background-color: var(--ku-gold);
        }

        .section-desc {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* 4. 작업 컴포넌트 (카드 및 폼) */
        .container-box {
            background: var(--bg-cream);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            border: 1px solid #EADCC9;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--ku-crimson);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #EADCC9;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            background: var(--white);
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--ku-crimson);
        }

        .action-btn {
            width: 100%;
            background-color: var(--ku-crimson);
            color: var(--white);
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .action-btn:hover {
            background-color: #6F1330;
        }

        /* 5. 실시간 채팅 UI */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
            background: var(--white);
            border: 2px solid #EADCC9;
            border-radius: 12px;
            overflow: hidden;
        }

        .chat-header {
            background: #F1ECE6;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid #E2D7CD;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #FAF6F0;
        }

        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
        }

        .msg.incoming {
            background-color: var(--white);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #EADCC9;
        }

        .msg.outgoing {
            background-color: var(--ku-crimson);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: var(--white);
            border-top: 1px solid #E2D7CD;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #EADCC9;
            border-radius: 8px;
            outline: none;
        }

        .chat-input-area button {
            background: var(--ku-crimson);
            color: var(--white);
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 푸터 */
        footer {
            background-color: #2B2B2B;
            color: #ccc;
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        /* 부드러운 스크롤 효과 */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="scrollToSection('home')">🐯 고대 밥메이트</div>
        <ul class="menu">
            <li><a onclick="scrollToSection('auth')">이메일 인증</a></li>
            <li><a onclick="scrollToSection('profile')">프로필 설정</a></li>
            <li><a onclick="scrollToSection('create')">밥약 개설</a></li>
            <li><a onclick="scrollToSection('matching')">매칭 현황</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <h1>고대 아기호랑이를 위한 <span>안심 밥약 플랫폼</span></h1>
        <p>처음 보는 타과 동기, 선후배와 부담 없이 안암 캠퍼스 맛집에서 따뜻한 밥 한 끼를 함께하세요. 학교 인증 기반으로 안전하게 연결됩니다.</p>
        <button class="cta-btn" onclick="scrollToSection('auth')">지금 시작하기 ✨</button>
    </
